<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mudassir Portfolio</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Manrope:wght@400;500;600&family=Space+Grotesk:wght@600;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap"
    rel="stylesheet">

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            secondary: ['Manrope', 'sans-serif'],
            mono: ['Space Mono', 'monospace'],
          },
          animation: {
            'infinite-scroll': 'infinite-scroll 25s linear infinite',
          },
          keyframes: {
            'infinite-scroll': {
              from: { transform: 'translateX(0)' },
              to: { transform: 'translateX(-100%)' },
            }
          }
        },
      },
    }
  </script>

  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: 'Inter', sans-serif;
    }
  </style>

  <script type="importmap">
{

    "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
    "react-router-dom": "https://esm.sh/react-router-dom@6.22.3?external=react,react-dom",
    "matter-js": "https://esm.sh/matter-js@0.19.0",

    "react/": "https://aistudiocdn.com/react@^19.2.1/"
  }
}
</script>
  <script type="module" src="/src/index.tsx"></script>
  <link rel="stylesheet" href="/src/index.css">
</head>
